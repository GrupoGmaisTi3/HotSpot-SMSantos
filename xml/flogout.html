<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <title>Desconectado - WiFi Supermercado Santos</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

            <!-- Logo -->
                <img src="../img/logo.png" alt="Supermercado Santos" class="logo" />

                <!-- Message -->
                <div class="success-message" style="background: linear-gradient(135deg, #fef3c7, #fde68a);">
                    <div class="icon" style="background: linear-gradient(135deg, var(--secondary), #f59e0b);">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                        </svg>
                    </div>
                    <h2 style="color: var(--secondary);">Desconectado!</h2>
                    <p style="color: var(--text-muted);">Você foi desconectado do WiFi Grátis.</p>
                </div>

                <!-- Reconnect -->
                <div style="text-align: center; margin-top: 20px;">
                    <a href="$(link-login)" class="quick-link" style="background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white;">
                        Conectar novamente
                    </a>
                </div>

                <!-- Footer -->
                <div class="footer">
                    <p>Powered by MikroTik RouterOS &bull; Supermercado Santos</p>
                </div>
                </div>

</body>

</html>
