<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <title>Erro - WiFi Supermercado Santos</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

            <!-- Logo -->
                <img src="../img/logo.png" alt="Supermercado Santos" class="logo" />

                <!-- Error Message -->
                <div class="error-message">
                    <div class="icon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                        </svg>
                    </div>
                    <h2>Ops! Algo deu errado</h2>
                    <p style="color: var(--text-muted);">$(error)</p>
                </div>

                <!-- Info Box -->
                <p class="info alert" style="margin-top: 20px;">
                    Tente novamente ou procure atendimento na loja.
                </p>

                <!-- Actions -->
                <div style="text-align: center; margin-top: 20px;">
                    <a href="$(link-login)" class="quick-link" style="background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white;">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="fill: currentColor;">
                            <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                        </svg>
                        Tentar novamente
                    </a>
                </div>

                <!-- Footer -->
                <div class="footer">
                    <p>Powered by MikroTik RouterOS &bull; Supermercado Santos</p>
                </div>
                </div>

</body>

</html>
