<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <script>if(window.top!==window.self){window.top.location.href=window.self.location.href}</script>
    <meta name="description" content="Redirecionando para a página solicitada..." />
    <meta name="theme-color" content="#E8732A" />
    <title>Redirecionando - WiFi Supermercado Santos</title>
    <script>
        window.LOG_LEVEL = 'info';
        window.HS_CONTEXT = {
            macAddress: '$(mac-address)',
            ipAddress: '$(ip)',
            routerIdentity: '$(identity)',
            hotspotUser: '$(username)',
            sessionId: '$(session-id)',
            loginBy: '$(login-by)',
            page: 'redirect'
        };
        window.LOG_ENDPOINT = '';
    </script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        function startRedirect() {
            location.href = '$(link-orig)';
        }
    </script>
</head>

<body onLoad="startRedirect()">

    <a href="#main-content" style="position:fixed;top:-100%;left:50%;z-index:9999;background:var(--primary);color:#fff;padding:12px 24px;border-radius:0 0 8px 8px;font-weight:700;transition:top 0.2s;" onfocus="this.style.top='0'" onblur="this.style.top='-100%'">Pular para conteúdo principal</a>

    <header class="header">
        <img src="img/logo.png" alt="Supermercado Santos" class="logo" />
    </header>

    <main id="main-content" role="main">

        <div class="status-message status-message--info animate-slide">
            <div class="status-message__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
            </div>
            <h2 class="status-message__title" style="color: var(--accent);">Aguarde...</h2>
            <p class="status-message__desc">Redirecionando para a página solicitada.</p>
        </div>

        <p class="fallback-link info">
            Se nada acontecer, clique <a href="$(link-orig)">aqui</a>
        </p>

    </main>

    <footer class="footer" role="contentinfo">
        <p>Powered by MikroTik &bull; <span class="footer__brand">Supermercado Santos</span></p>
    </footer>

    <script src="js/quick-links.js"></script>
    <script src="js/logger.js"></script>
</body>

</html>
