openapi: 3.0.1
info:
  title: 'RP Services'
  description: |
    Alerta: o formato de uso de sessão e cookies foi descontinuado na versão 3.0.0.01 e superiores, favor migrar para o uso de tokens, e para isso deve-se utilizar o serviço /v1.1/auth (na sessão 00001).
    
    
    
    Esta API disponibiliza regras de negócio dos sistemas RP One, Flex, Mix e Cxo, e Mix-Integração. Para testes e homologação pode-se  utilizar o servidor 'http://servicosflex.rpinfo.com.br:9000'.

    Para acesso ao web service, é necessário solicitar a inclusão de um usuário com as permissões necessárias, a inclusão desse usuário deve ser solicitado a empresa que disponibiliza o web service.

    Para o correto funcionamento deve-se armazenar e fornecer o token recebido no método de autenticação a cada nova requisição..  Válido apenas para a versão '2.0.0.83' ou superior.

    Todos os métodos devem ser executados enviando o atributo 'Content-type: application/json' no cabeçalho http.

    Todos os métodos devem ser executados enviando o atributo 'token: d5333225-120c-4ed2-a06f-b01dfd96d79e' (token recebido na autenticação) no cabeçalho http, exceto no método de autenticação.
    Observacao - o token 'd5333225-120c-4ed2-a06f-b01dfd96d79e' é meramente ilustrativo.

    Deve-se avaliar os atributos 'tokenExpiration' ou 'expiresIn' para saber até quando o token é válido, a definição de tempo para expirar é definido pelo provedor do serviço.

    Todos os parâmetros passados devem ser codificados no padrão "URL-encoded"

    Para realizar testes de sintaxe de comunicação, está disponível um ambiente provido pela RP Info Sistemas no endereço http://servicosflex.rpinfo.com.br:9000. O usuário para acesso a este ambiente de homologação é '100000' e a senha é '123456', exatamente conforme o exemplo apresentado na rota /v1.1/auth (na sessão 00001)
