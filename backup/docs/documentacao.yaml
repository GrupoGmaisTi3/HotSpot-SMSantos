        - appVersion
        - content

    MovDctosDto:
      type: object
      description: "Dados do movimento de documento financeiro gerado após a baixa"
      properties:
        transacao:
          type: string
          example: "TR000123456"
          description: "Identificador único da transação"
        operacao:
          type: string
          example: "OPR1234"
          description: "Código da operação associada à transação"
        dataMvto:
          type: string
          format: date
          example: "28/08/2024"
          description: "Data de movimento (dd/MM/yyyy)"
        dataLcto:
          type: string
          format: date
          example: "28/08/2024"
          description: "Data do lançamento contábil (dd/MM/yyyy)"
        usua_lcto:
          type: integer
          example: 123
          description: "Código do usuário responsável pelo lançamento"
        espe_codigo:
          type: string
          example: "CHQ"
          description: "Código da espécie do documento"
        status:
          type: string
          example: "BAIXADO"
          description: "Status do documento (ex: BAIXADO, PENDENTE, CANCELADO)"
      required:
        - transacao
        - operacao
        - dataMvto
        - dataLcto
        - usua_lcto
        - espe_codigo
        - status
