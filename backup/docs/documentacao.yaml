    PayloadReparcelamentoPendFinReq:
      type: object
      description: "Payload para reparcelamento de pendências financeiras"
      properties:
        dctoCodigo:
          type: string
          maxLength: 4
          example: "2598"
          description: "Código do documento no sistema de retaguarda"
        dataMovimento:
          type: string
          format: date
          example: "28/08/2024"
          description: "Data de movimento (dd/MM/yyyy)"
        pfin_operacao:
          type: string
          maxLength: 26
          example: "OPR0000000012345678901234"
          description: "Identificador da operação financeira original"
        unidadeMovimento:
          type: string
          maxLength: 3
          example: "001"
          description: "Código da unidade onde o movimento será registrado"
        observacao:
          type: string
          maxLength: 400
          example: "Reparcelamento em 3x de título vencido"
          description: "Observações gerais sobre o reparcelamento"
        especieCodigo:
          type: string
          maxLength: 4
          example: "CHQ"
          description: "Código da espécie do documento"
        numeroDocumento:
          type: string
          maxLength: 20
          example: "1234567890"
          description: "Número do documento de origem"
        parcelas:
          type: array
          description: "Lista de novas parcelas geradas para o reparcelamento"
          items:
            $ref: "#/components/schemas/ParcelasPendFinReq"
      required:
        - dctoCodigo
        - dataMovimento
        - pfin_operacao
        - unidadeMovimento
        - parcelas

    ParcelasPendFinReq:
      type: object
      description: "Informações de cada parcela gerada no reparcelamento"
      properties:
        valor:
          type: number
          format: double
          example: 1500.75
          description: "Valor da parcela"
        dataVcto:
          type: string
          format: date
          example: "30/09/2024"
          description: "Data de vencimento da parcela (dd/MM/yyyy)"
        port_codigo:
          type: string
          example: "001"
          description: "Código da portadora associada à parcela (opcional)"
        espe_codigo:
          type: string
          example: "CHQ"
          description: "Código da espécie da parcela (opcional)"
      required:
        - valor
        - dataVcto

    PayloadBaixaPendFinReq:
      type: object
      description: "Payload para baixa de pendências financeiras"
      properties:
        dctoCodigo:
          type: string
          maxLength: 4
          example: "2598"
          description: "Código do documento no sistema de retaguarda"
        dataMovimento:
          type: string
          format: date
          example: "28/08/2024"
          description: "Data de movimento (dd/MM/yyyy)"
        dataContabil:
          type: string
          format: date
          example: "28/08/2024"
          description: "Data contábil (dd/MM/yyyy)"
        unidadeMovimento:
          type: string
          maxLength: 3
          example: "001"
          description: "Código da unidade de movimento"
        unidadeAcessorios:
          type: string
          maxLength: 3
          example: "002"
          description: "Código da unidade de acessórios"
        contaBaixa:
          type: integer
          format: int32
          example: 12345678
          description: "Conta utilizada para a baixa"
        codigoHistorico:
          type: string
          maxLength: 4
          example: "0101"
          description: "Código do histórico contábil"
        complementoHistorico:
          type: string
          maxLength: 100
          example: "Baixa de pendências de fornecedores"
          description: "Complemento do histórico contábil"
        observacao:
          type: string
          maxLength: 400
          example: "Baixa realizada automaticamente pelo sistema"
          description: "Observações gerais da baixa"
        especieCodigo:
          type: string
          maxLength: 4
          example: "CHQ"
          description: "Código da espécie do documento"
        numeroDocumento:
          type: string
          maxLength: 20
          example: "1234567890"
          description: "Número do documento financeiro"
        pendencias:
          type: array
