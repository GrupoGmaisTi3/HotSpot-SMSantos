    RefDocumentoFDE:
      type: object
      description: |
        Documento referenciado por um documento FDE. Pode ser de dois tipos distintos:
        - Tipo "F" (Fiscal): Use RefDocumentoFDEFiscal
        - Tipo "P" (Processo): Use RefDocumentoFDEProcesso
      oneOf:
        - "$ref": "#/components/schemas/RefDocumentoFDEFiscal"
        - "$ref": "#/components/schemas/RefDocumentoFDEProcesso"

    RefDocumentoFDEFiscal:
      type: object
      description: Referência a um documento fiscal (Tipo F)
      properties:
        tipoReferencia:
          type: string
          description: Tipo de referência ("N" - Nota Fiscal / "F" - Nota Fiscal Eletrônica / "R" - Nota Fiscal de Produtor Rural / "C" - Conhecimento de Transporte Eletrônico / "P" - Processo ou Ato Concessório / "D" - Documento de Arrecadação)
          example: "F"
        dataEmissao:
          type: string
          description: Data de emissão (formato dd/mm/yyyy)
          example: "01/01/2022"
        catEntidade:
          type: number
          description: Categoria da entidade (“U” – Unidade/Loja, “F” – Fornecedor, “C” – Cliente, “I”)
          example: "F"
        codEntidade:
          type: number
          description: Código da entidade
          example: "100006"
        modeloDcto:
          type: string
          description: Modelo do documento
          example: "55"
        serieDcto:
          type: string
          description: Série do documento
          example: "1"
        numeroDcto:
          type: string
          description: Número do documento
          example: "1064"
        chaveDfe:
          type: string
          description: Chave de acesso da NFe (44 caracteres)
          example: "12345678901234567890123456789012345678901244"
        totalDcto:
          type: number
          format: double
          description: Valor total do documento referenciado
          example: 150.00
        indTipoOperacao:
          type: string
          description: Indicador do tipo de operação
          example: "0"
        indEmitente:
          type: string
          description: Indicador de emitente (0 - terceiros, 1 - próprio)
          example: "1"

    RefDocumentoFDEProcesso:
      type: object
      description: Referência a um processo judicial (Tipo P)
      properties:
        tipoReferencia:
          type: string
          description: Tipo de referência - sempre "P" para Processo Judicial
          example: "P"
        numeroDcto:
          type: string
          description: Número do processo
          example: "123"
        processoOrigem:
          type: string
          description: Origem do processo
          example: "3"
        processoDescricao:
          type: string
          description: Descrição do processo
          example: "Remoção do ICMS da Base de PIS e COFINS"
        processoSecao:
          type: string
          description: Seção do processo
          example: "05"
        processoVara:
          type: string
          description: Vara do processo
          example: "02"
        processoTipo:
          type: string
          description: Tipo de processo (J para Judicial)
          example: "J"
        processoNatureza:
          type: string
          description: Natureza do processo
          example: "01"

    ResponseCriacaoDocumentoFDE:
      type: object
      description: Response da criação de um documento FDE via POST
      properties:
        response:
          type: object
          properties:
            status:
              type: string
              description: Status da operação (ok = sucesso, erro = falha)
              example: "ok"
            messages:
              type: array
              description: Lista de mensagens de processamento
              items:
                type: object
                properties:
                  message:
                    type: string
                    description: Mensagem descritiva do processamento
                    example: "Dados processados"
            numeroRecibo:
              type: integer
              description: Número do recibo da operação realizada
              example: 10005

