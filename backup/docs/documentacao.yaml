      name: cnpj
      in: path
      description: "Cnpj da unidade"
      required: true
      schema:
        type: string
    codigoProdPathParam:
      name: codigo
      in: path
      description: "Código interno do produto"
      required: true
      schema:
        type: integer
    lastIdPathParam:
      name: lastId
      in: path
      description: Código do último produto consultado. Envie "0" caso queira consultar
        todas as informações. (mesmo passando 0 os dados retornam paginados)
      required: true
      schema:
        type: number
    outrosExtrasParam:
      name: outrosextras
      in: query
      description: "True para processar os Campos Extras do cliente e retornar o atributo 'camposExtras'"
      required: false
      schema:
        type: boolean
  securitySchemes:
    mwrp_auth:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: http://servicosflex.rpinfo.com.br:9000/v1.1/auth
          scopes:
            write:mwrp: modify datas in your account
            read:mwrp: read your data
            