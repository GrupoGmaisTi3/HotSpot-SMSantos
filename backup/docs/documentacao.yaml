        - dataPrevista
        - codigoHistorico
        - complementoHistorico
        - codigoBancario

    ResponseContentMovDctosTransacaoPendFin:
      type: object
      description: "Resposta bem-sucedida da API, contendo os dados do conteúdo solicitado"
      properties:
        appVersion:
          type: string
          example: "2.0.75"
          description: "Versão da aplicação que processou a requisição"
        pages:
          type: integer
          nullable: true
          example: null
          description: "Número total de páginas (caso o conteúdo seja paginado)"
        content:
          oneOf:
            - $ref: "#/components/schemas/MovDctosDto"
            - type: string
              example: "Baixa de pendências financeiras processada com sucesso"
          description: "Conteúdo retornado pela operação"
