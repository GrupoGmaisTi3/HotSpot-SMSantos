          description: "Data prevista para compensação bancária (dd/MM/yyyy)"
        observacao:
          type: string
          maxLength: 3
          example: "OK"
          description: "Observações curtas sobre a transação"
        codigoHistorico:
          type: string
          maxLength: 4
          example: "0501"
          description: "Código do histórico bancário"
        complementoHistorico:
          type: string
          maxLength: 100
          example: "Depósito referente à baixa de títulos"
          description: "Complemento do histórico bancário"
        codigoBancario:
          type: string
          maxLength: 4
          example: "341"
