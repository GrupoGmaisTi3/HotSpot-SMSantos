<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <script>if(window.top!==window.self){window.top.location.href=window.self.location.href}</script>
    <meta name="description" content="Ocorreu um erro no acesso ao WiFi Grátis do Supermercado Santos." />
    <meta name="theme-color" content="#E8732A" />
    <title>Erro - WiFi Supermercado Santos</title>
    <script>
        window.LOG_LEVEL = 'info';
        window.HS_CONTEXT = {
            macAddress: '$(mac-address)',
            ipAddress: '$(ip)',
            routerIdentity: '$(identity)',
            hotspotUser: '$(username)',
            sessionId: '$(session-id)',
            loginBy: '$(login-by)',
            page: 'error'
        };
        window.LOG_ENDPOINT = '';
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <a href="#main-content" style="position:fixed;top:-100%;left:50%;z-index:9999;background:var(--primary);color:#fff;padding:12px 24px;border-radius:0 0 8px 8px;font-weight:700;transition:top 0.2s;" onfocus="this.style.top='0'" onblur="this.style.top='-100%'">Pular para conteúdo principal</a>

    <header class="header">
        <img src="img/logo.png" alt="Supermercado Santos" class="logo" />
    </header>

    <main id="main-content" role="main">

        <div class="status-message status-message--error" role="alert">
            <div class="status-message__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                </svg>
            </div>
            <h2 class="status-message__title">Ops! Algo deu errado</h2>
            <p class="status-message__desc">$(error)</p>
        </div>

        <div class="section--centered">
            <p class="info info--alert" role="alert">
                Tente novamente ou procure atendimento na loja.
            </p>
        </div>

        <div class="section--centered text-center">
            <a href="$(link-login)" class="quick-link quick-link--primary">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="fill: currentColor;" aria-hidden="true">
                    <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
                Tentar novamente
            </a>
        </div>

        <div class="store-info store-info--inset">
            <div class="store-info__header">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                </svg>
                Precisa de ajuda?
            </div>
            <div class="store-info__address">
                Entre em contato com nossa equipe na loja.
            </div>
        </div>

    </main>

    <footer class="footer" role="contentinfo">
        <p>Powered by MikroTik &bull; <span class="footer__brand">Supermercado Santos</span></p>
    </footer>

    <script src="js/quick-links.js"></script>
    <script src="js/logger.js"></script>
</body>

</html>
